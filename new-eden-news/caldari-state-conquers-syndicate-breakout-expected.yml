content:
- body: "![Syndicate Caldari](//images.ctfassets.net/1gqwxa4vbed9/2vKPABR7fesWhPCkFCdFOL/e0eff2c71c35da633fc4141776f7c43e/Syndicate_Caldari.png)\n*Caldari
    Navy accepts the surrender of local authorities in Poitot.*\n\nThe Caldari Navy
    has launched a major offensive on Syndicate, claiming sovereignty and declaring
    the region an unincorporated State territory. Coordinated fleets swept through
    the 106 systems, demanding that local authorities surrender and accept State rule.
    While there were some limited exchanges of fire, the majority of these authorities
    surrendered quickly.\n\nThe military operation was carried out in response to
    the supposed role of the Intaki Syndicate in the recent Jita-gate disaster. Executive
    General Heika Torigo, who led the operation, spoke to reporters from the Intaki
    Syndicate Bureau in Poitot, \u201CThe goal of this operation was to end the Syndicate
    threat with minimum damage to civilian infrastructure or harm to the innocent
    people of the Syndicate region. In both these respects, the operation has been
    an unmitigated success.\u201D\n\nThe Intaki Syndicate is not a unified group,
    but a series of autonomous entities linked together by mutual cooperation. Torigo
    used a precise chain of strategic deployments across the region to guarantee each
    engagement featured a significant Caldari force against an unprepared and outgunned
    fleet of local Intaki Space Police.\n\nDespite the Caldari\u2019s success, many
    planets and the majority of Stations within Syndicate remain under the control
    of local authorities with ties to the Intaki Syndicate. Chairman Akimaka Saraki
    addressed the people of Syndicate via holocast, conveying that \u201Cthis is just
    the beginning.\n\n\u201CLong have we Caldari and the exiled Intaki of Syndicate
    been kindred spirits. Your forebearers acted against the crushing weight of Federation
    control, just as ours did. Two years ago, we made a commitment to protect you,
    the Intaki of Syndicate. Now it has become clear that the very group we signed
    that agreement with is the greatest threat to this region, and beyond.  They have
    sold their own people\u2019s independence to pirates and thieves at a black market
    price.\n\n\u201C We shall no longer suffer the dishonor that the so-called Intaki
    Syndicate spreads. Dismantling an organization with its claws dug in this deep
    will take time and your trust. We will earn that trust by acting with honor, showing
    you the value we place on loyalty, and demonstrating our strength. Join us and
    lift this region out of the darkness and deliver justice to the Intaki Syndicate.\u201D\n\n###
    President Offers Amnesty, Syndicate Breakout Expected\n\nIntaki Prime-born Federation
    President, Alix Moreau, has promised amnesty to the descendants of those exiled
    from her planet during what the Federation leader has called \u201Cthe darkest
    period in our history.\u201D While many Syndicate residents have no desire to
    return to Federation rule, the proposal is expected to appeal to higher-ranking
    members of the Intaki Syndicate who are now fleeing from a Caldari manhunt.\n\nCaldari
    Navy forces have received intel that capital ships carrying high-priority Intaki
    Syndicate targets will be moving out of Syndicate on YC128.05.07. With multiple
    possible routes out of the region and into Federation space, the Navy is calling
    on capsuleers to help them intercept these forces as they cross into Federation
    territory. Smaller undetectable vessels are expected to make the crossing via
    more circuitous routes, but stopping this major breakout would be a significant
    victory in the State's efforts to dismantle the Syndicate.\n\n### News In Brief\n\n-
    Caldari forces maintain engagement lines with Federation Navy despite Syndicate
    force diversion.\n\n- Capital fight in Querious leads to over 2.5 Trillion ISK
    in combined losses.\n\n- Initiative diplomats announce an end to raids on Winter
    Coalition infrastructure.\n\n- Traffic monitors in UALX-3 report suspected mass
    cynosural field invasion in fact capsuleer beacon display.\n\n- Residents of Syndicate
    put forth motion to preserve legacy of Isana en Poitot following Caldari sovereignty.\n\n-
    Vherokior tribe warns of threat posed by Amarr missionaries in Republic space
    due to Warpath invasions."
