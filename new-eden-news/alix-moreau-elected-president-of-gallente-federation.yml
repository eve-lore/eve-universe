content:
- body: "![Moreau Victory Rally](//images.ctfassets.net/1gqwxa4vbed9/4aGNELXrPV3M1UaT5J69aR/b3e653b94d2032b856a2040efff6a38b/MoreauVictory.png)\n\n###
    Moreau Celebrates Election Victory\nAlix Moreau, with 34.8% of the popular vote
    and only one more district than Soraya Roden, has been elected President of the
    Gallente Federation. The Governor of Bourynes has claimed a narrow victory at
    the last minute in one of the closest elections ever on record.\n\nAlix Moreau
    appeared on stage at a victory rally in Dodixie, where they formally accepted
    the position of President. In their acceptance speech, they thanked their supporters,
    calling them \u201Cthe bastions of tomorrow\u201D for being willing to embrace
    Moreau\u2019s vision of a brighter future. \u201CToday we claim victory not just
    for ourselves, but for the generations still to come. Today, we choose the freedom
    of what could be. The freedom to explore, the freedom to think for ourselves,
    the freedom to experiment, a freedom without limits!\u201D \n\nMoreau called on
    the citizens of the Federation, \u201CEvery triumph and every failure has been
    a teacher, and we have learned their lessons. Never again will we find ourselves
    lagging behind. Instead, those who detest our freedoms will quake in shame at
    the new innovations we alone are bold enough to embrace.\u201D\n\nMany on Intaki
    were keen to hear what the new President had to say about their own system, as
    Moreau was supported by the Autonomist party of Intaki origins. No specific plans
    were laid out, but Moreau did mention their intention to \u201CBuild towards a
    stronger democracy that recognizes the rights of every citizen, every planet,
    and every district to embrace its chosen destiny. We, as a Federation, will not
    be limited by the assumption that freedom for some means a loss of liberty for
    others.\u201D\n\nMoreau\u2019s inauguration has been expedited by the Federation
    Administration to avoid a potential constitutional crisis. Alix Moreau will be
    sworn in to office on YC128.04.21 in Caille, Gallente Prime.\n\n![final election
    results](//images.ctfassets.net/1gqwxa4vbed9/1CqRlCyi5Tuiawl24MjQz4/f8f2e2aa2305bf2904c98dbeed13cf28/final_election_results.png)\n\n###
    Roden Remains Defiant\nSoraya Roden conceded defeat at a rally at the Roden Ampitheatre
    on Alentene VI\u2019s sixth moon. The Roden campaign initially refused to accept
    the result, having lost by only 0.8% of the popular vote, and called for an immediate
    recount. However, thanks to updated election software and procedures, it took
    only nine minutes to recheck and confirm every single vote cast across the Federation.
    The original result was confirmed with a 2-vote margin of error.\n\nAccording
    to sources within the amphitheatre\u2019s staff, event organizers were ordered
    by the Roden campaign to only prepare for victory. As a result, they were forced
    at the last minute to scramble to take down animated holograms of Soraya Roden
    celebrating victory while her opponent cowered in shame. \n\nThe emotional spectrum
    of the Roden fans gathered ranged from tearful to open rage. Soraya Roden addressed
    the crowd with a message of defiance, telling them, \u201CDon\u2019t worry, we
    are not done. From outside the corrupt halls of power, our voices will still ring
    out as true as ever before. We are the might and industry of our great Federation,
    and we will not go quietly! Whenever politicians choose weakness over strength,
    chaos over tradition, or fragmentation over unity, we will be heard. our prosperity,
    our freedom.\u201D\n\nAccording to sources within the Roden campaign, she was
    contacted by the President-Elect\u2019s office shortly after the result was announced,
    but refused to take the call. Instead, Roden has been reaching out to her contacts
    throughout the political and business world. What her intention is remains to
    be seen.\n\n### Tenzin Celebrates Community \nLucas Tenzin accepted defeat at
    a rally held on his birth planet of Aclan VI. A barren world mostly known for
    its mining operations, it struggled to deal with the massive influx of the Senator's
    supporters. Many in attendance were low-income workers who attended at great expense,
    bringing food and music to what felt more like a gigantic festival or cookout
    than a political rally. \n\nTenzin, whose third-place position has been all but
    assured for weeks, addressed the crowd while holding a Tei-Su style bowl of curried
    tofu, \u201CWe may not have secured the Presidency, but we have secured something
    just as valuable: a community. What I ask you all now is to not let that community
    fade away in the years to come. Watch out for each other, stand up for each other,
    and hold those who would harm your community to account. We may have lost, but
    we are not defeated. I congratulate President-elect Moreau on their new position,
    and I hope they have the wisdom to know that no automaton or calculator could
    replace the people gathered here today. Should they forget, I have no doubt that
    this community will be there to remind them.\u201D\n\n### News in Brief\n- Empress
    Catiz I welcomes new President, promises to support free trade between nations.\n\n-
    Sanmatar Shakor calls new President a \u201Csingular mind\u201D, but councils
    against the possible \u201Cfractures\u201D caused by a loss of unity.\n\n- Chairman
    Saraki calls Gallente election result \u201Cevidence of Federation insanity\u201D.\n\n-
    CONCORD welcomes the new president while reiterating organizations prhobition
    on advanced AI development.\n\n- House of Records and Caldari Business Tribunal
    report rumored to indicate Jita lies at heart of State corruption.\n\n- Brutor
    Chief Wkumi Pol boasts Republic Fleet could make short work of Amarr High-sec
    defenses were it not for CONCORD protocols.\n\n- Lord Arim Ardishapur and Lord
    Arrach Sarum petition for Minmatar military build-up to be treated as act of war.\n\n-
    EverMore\u2019s Interplanetary Media Network reports on economic hardship faced
    by baseliners in Jita.\n\n- Suspected Angel Cartel agents arrested in Yulai-Exordium
    gate construction crew disappear from custody.\n\n- CreoDron stock prices soar
    following election result.\n\n- Roden Shipyard confirms it will not be altering
    military contracts following Soraya loss.\n\n- Jacus Roden not available for interview
    following election."
