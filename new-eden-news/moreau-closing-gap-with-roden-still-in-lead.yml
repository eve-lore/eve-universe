content:
- body: "![Election Poll 128-04-02](//images.ctfassets.net/1gqwxa4vbed9/5MwPpWnXekRZn1iCt2mRXK/5de32c87847a24d81cdb2a641471c4a3/Election_Poll_128-04-02.png)\n\nAs
    the Gallente Federation\u2019s election day draws ever closer, Soraya Roden's
    first-place position is under pressure in the polls. Her closest competitor, Governor
    Alix Moreau, is closing in on the Roden shipyards scion with only 1.3% seperating
    the two candidates. Roden remains confident, dismissing Moreau\u2019s growing
    support at a rally in Aufay. \u201CI\u2019m not afraid of a little competition,\u201D
    she told those gathered. \u201CIt will take more than a few technocrats to disrupt
    this warp tunnel.\u201D\n\nDespite Roden\u2019s larger fan base, Moreau\u2019s
    supporters have shown greater enthusiasm for their chosen candidate. Capsuleers
    pledged to Moreau have proudly demonstrated their support in asteroid fields,
    out on the campaign trail, and in the battle to contain Rampant Fabricator outbreaks.
    These inspiring acts have turned the heads of more than a few Federation citizens.
    \u201CPeople say Moreau wants a robot apocalypse or some such nonsense.\u201D
    One of their supporters told the Scope at a convention in Dodixie. \u201CIf that\u2019s
    true, why are they rewarding them for taking these Fabricators out?\u201D Another
    supported chimed in, \u201CPeople don\u2019t get it, but Moreau does. It\u2019s
    about time we put an expert in charge, someone with a real vision for this Federation.\u201D\n\nSenator
    Lucas Tenzin remains steadfast in his campaign despite having gained only 0.3
    points in the polls. At a press conference held at an Extractor Control Unit,
    Tenzin went on the offensive, publicly calling out Soraya Roden\u2019s corporate
    interests. \u201CA vote for Roden is a vote for corruption,\u201D he announced.
    \u201CShe promises to turn back the clock, but that is just a fantasy. Private
    interests, stagnation, and your freedoms for sale. That is the reality of a Roden
    family victory.\u201D\n\nWith many voters still undecided and the three candidates
    closer than ever, the final result remains too close to call. The only certainty
    is that every vote, every act of support, will make a difference.\n\n### News
    in Brief\n- Open session of CONCORD\u2019s Inner Circle planned for coming weeks.\n\n-
    Panther-class vessels recalled for mechanical overhaul following firmware rollback.\n\n-
    AIR Opportunities development team collaborates with EDENCOM for improved service
    in Fortress systems. \n\n- Autonomist party compiles list of local authority demands
    from throughout Federation.\n\n- Lai Dai registers official objection to CEP over
    \u201Cexcessive\u201D House of Records probing.\n\n- Progressive Party retroactively
    removes Celes Aguard from party roster.\n\n- Unverified reports circulate of joint
    Thukker-Republic Fleet military exercises in Great Wildlands.\n\n- Jet-canned
    scordite funds piracy according to Federal Administration.\n\n- SOCT science teams
    meet with AIR astronomical researchers in Yulai."
