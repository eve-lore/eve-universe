content:
- body: "![Silphy en Diabel in maximimum security facility](//images.ctfassets.net/1gqwxa4vbed9/wUnHuit5Yo5pEfmSrJjo3/41ec2ad6c635f70dfc8f66d73ddfdf06/Silphy_in_prison.png)\n*Silphy
    en Diabel, detained inside a secure facility in Landfall, New Caldari.*\n\nSilphy
    en Diabel was arrested today as she arrived in Landfall, New Caldari. The unofficial
    leader of the Intaki-Syndicate was summoned to discuss accusations of the Syndicate's
    involvement in the recent Jita gate incident. On arrival, en Diabel\u2019s vessel
    was seized by Lai Dai Protection Service. The megacorporate security force then
    handed en Diabel over to a joint task force of State Peacekeepers and House of
    Records agents for interrogation.\n\nIsilionen Huomaila, CEO of the House of Records,
    explained the arrest to reporters outside the secure facility in which en Diabel
    is being held, \u201CIn March, two members of the Intaki Syndicate were found
    guilty of tampering with Jita\u2019s gates. The pair were originally convicted
    of sabotage, but faced further charges of terrorism following the attack on Jita.
    As part of a plea agreement, the pair has provided testimony and evidence that
    confirms the attack was carried out by Syndicate agents on Silphy en Diabel\u2019s
    orders.\u201D\n\nThe burgeoning Warpath Conflict has only increased the political
    will within the Caldari State to find and punish those responsible for the Jita-gate
    incident. With the financial breach that led to the incident also still ongoing,
    Chairman Akimaka Sarki's call for retribution has been echoed throughout the State.
    The slogan \u201CSmash the Syndicate\u201D has appeared in corporate petitions
    to management, memorials to the lost, and graffitied on walls across Caldari space.
    \n\nThis marks a dramatic swing in public relations between the State and the
    Syndicate. First formed by Intaki exiled from the Federation for Caldari sympathies,
    the Syndicate has since become an organization with a reputation for corruption
    and is regarded by many as a safe haven for pirates and smugglers. In YC124, they
    signed a treaty of protection with the Caldari in exchange for granting the State
    control over the constellation DS-M4Q. This led to an elevated diplomatic status
    for Syndicate members within the State. According to Huomaila, \u201Cthe Intaki
    Syndicate made use of our special relationship to obtain high-level access and
    exploit it. This is an act of betrayal, and our national honor demands a response.\u201D\n\nAn
    association of free entities rather than a contiguous government, the Syndicate
    has no formal ruler. However, Silphy en Diabel is generally regarded as its unofficial
    leader. Notorious throughout the cluster for her cunning and savvy, many were
    surprised that she agreed to visit the State during a period of such unease. en
    Diabel herself is unavailable for comment as she is considered a high-risk detainee
    and is being held in a special isolation within a maximum security facility. However,
    her legal representative did read a statement she had written stating her innocence
    and informing the authorities \u201Cnot to waste their time setting up a trial.\u201D\n\n###
    News in Brief\n\n- Rumors of preparations for large-scale mobilization by Syndicate
    as assets pile up in capital hangars under their control.\n\n- President Moreau
    raises possibility of amnesty for descendants of exiles in address to Intaki assembly.\n\n-
    SOE sends aid delegation to Jita as humanitarian crisis worsens.\n\n- Reverend
    Mother Santimona Sarpati declines ot comment on en Diabel arrest.\n\n- Casaulties
    rise across cluster as Warpath conflict spreads.\n\n- Tunir Tash-Murkon calls
    for firing of Overseer Quartmaster for incorrect system designation.\n\n- Sukuuvestaa
    CEO Kuikiainen Onita compares Syndicate to Guristas in controversial condemnation.\n\n-
    Ammatar Mandate elite pilots praised by Grand Admiral Kezti Sundara for Warpath
    response."
