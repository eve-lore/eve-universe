author: Johanna Marqoso
category: New Eden News
content:
- body: "Two more candidates have joined the Gallente Presidential race in recent
    weeks. Bourynes Governor Alix Moreau has declared her intention to run while giving
    the keynote speech at a robotics symposium held in the Lirsautton I - CreoDron
    Factory. Moreau\u2019s bid is being backed by the newly formed Autonomist party,
    a federal offshoot of the Intaki Autonomists whose flagship issue is the greater
    empowerment of local authorities. Though Moreau\u2019s more radical views are
    not shared by all Autonomists, they have thrown their support behind her in hopes
    of riding her surging popularity to success.\n\nThe final candidate to declare
    is the rising Senate star, Lucas Tenzin. Tenzin announced his candidacy via a
    Federation-wide holocast. Running as an independent without party affiliations,
    Tenzin hopes to bring the \u201Chumanity first\u201D policies that have won over
    his home region of Everyshore to the rest of the Federation.\n\nWith three relative
    unknowns holding the fate of the Federation in their hands, the Scope has dispatched
    our own Johanna Marqoso to uncover all she can about these very different figures
    in our new interview series, Presidential Profiles.\n\n![Lucas Tenzin visiting
    refinery](//images.ctfassets.net/1gqwxa4vbed9/1sueQReojyBSfNDDAJeYfg/96e885650ccaff0b5648ebe80b315c36/Tenzin_Refinery.png)\n###
    Presidential Profiles: Lucas Tenzin\n\nWhen I think of a presidential candidate
    interview, I think of high-profile locations. Luxurious campaign yachts, aptly
    named Presidential suites, stately halls. So while I was intrigued when the Tenzin
    campaign arranged for me to join him at an ore refinery, I was also a little disappointed.\n\n\u201CMost
    of these workers are second or third generation.\u201D Senator Lucas Tenzin told
    me while refinery union members nodded in agreement. \u201CTheir sweat, their
    family\u2019s sweat, has been extracted from every ounce of minerals this facility
    pumps out for over thirty years. Now the owners want to lay off 60% of the workforce
    and ship them out. That ain't right.\u201D\n\nRapturous applause followed; these
    are the Senator's base after all. Lucas Tenzin is a military veteran who came
    to office after campaigning for labor rights throughout his home region of Everyshore.
    Tenzin earned the loyalty of his constituents on picket lines and veteran outreach
    centers, working his way from local welfare campaigns to the Senate floor.\n\nAfter
    speaking with each and every union member present, I sat down with the Senator
    for a conversation in the refinery breakroom. While we shared vending machine
    coffee, he apologised for the wait, saying that \u201CI respect your publication
    and its readership, but who knows when I will have the chance to meet with these
    people again.\u201D\n\nTenzin joined the military at the age of eighteen. He received
    a Heart of Freedom medal for his service, but when I bring it up, he waves dismissively.
    \u201CThat I am here today is not thanks to any kind of heroism on my part; it
    is thanks to good doctors and an abundance of luck. If one of these refiners were
    to experience an accident with similar consequences, their fate would be very
    different.\u201D \n\nFew could doubt Tenzin\u2019s interest in the needs of the
    Federation worker, but his critics have said his interventions on their behalf
    point to an anti-innovation attitude. \u201CAnti-innovation is the kind of mud
    people love to sling when you call them on their nonsense,\u201D Tenzin said,
    an eyebrow cocked as he leaned back in his chair. \n\n\u201CWithout the innovations
    of Gallente scientists, I would not even be sitting here right now. Instead of
    being dead, I have a heart that can beat up to six times faster than a baseline
    human, lungs that require half the air, and an eye that can see infrared.\u201D
    Tenzin received over thirty-seven separate augmentations after nearly dying when
    his ship exploded.\n\n\u201CI am not anti-innovation; I just think some people
    are pointing in the wrong direction. Why invest in smarter robots when the infirm
    would rather transfer into an Upwell clones than remain in the Federation? During
    my first tour, I fought Rogues in the Drone Regions, and none of them seemed very
    keen to make my life better. We have already been gifted with the greatest intelligence
    our cluster has to offer; we should be investing in the bodies that house them.\u201D\n\nWhen
    asked what he learned in the service, Tenzin responds, \u201CThat when someone
    shouts duck, you listen, to keep your fusion battery contact points clean, and
    that war is not something you do on a whim.\u201D\n\nI changed topics to raise
    one of the main talking points of this election cycle: the autonomy or independence
    of Intaki. Tenzin had already returned to civilian service before President Aguard
    ordered the controversial invasion of Intaki. When asked what he would have done
    in her place, the Senator loses some of his trademark directness, \u201CIn the
    service, you learn wars are not something to start on a whim. I was not a fan
    of Aguard or her way of doing business, but what has already happened cannot be
    easily undone.\u201D\n\nThe Senator\u2019s campaign has sought to frame him as
    a bastion of Federal unity, but the issue of local autonomy promises to become
    one of this election's hot-button issues. \u201CI hope the people of Intaki will
    continue to choose the protections and privileges of life within the Federation,\u201D
    he continues, \u201Cbalancing the value of local autonomy with Federal protection
    has always been a delicate act. \n\n\u201CMy parents were born on Tei-Su in Lirsautton,\u201D
    Tenzin explains, \u201CIt is a place with incredible natural preserves, beautiful
    architecture, and the best damn curry sauce in the Federation. But they chose
    instead to live in a poor mining colony in the barren wastes of Aclan VI because
    there, no one called them \u2018Jing Ko\u2019, only \u2018neighbor\u2019. \n\n\u201CI
    love to read history. Across New Eden, we see the same story on repeat. People
    live on one island, they meet people from another island, and they start throwing
    rocks at each other over the fish that swim in the middle. Time goes on, islands
    become continents, planets, star systems\u2026 but the story remains the same.\n\n\u201CThe
    Federation was one of the first times we as a species stopped and said, hey, what
    if we didn\u2019t fight over the fish? What if we share them instead? What a beautiful
    idea that was. But to keep that idea alive, we have to focus on the whole, not
    just our personal domains. Otherwise, we\u2019re just back to being a bunch of
    islands with too many rocks and not enough fish.\u201D\n\n### News in Brief\n\n-
    CONCORD engineers baffled by ongoing NEOCOM symbology glitch causing confusion
    among capsuleers.\n\n- Nugoeihuvi announces plans for new \u201Cpatriotism-aligned\u201D
    awards body.\n\n- Over 100 dreadnoughts destroyed in Vale of the Silent as Winter
    Coalition counterattack catches out The Initiative and allies.\n\n- Tribal Liberation
    Force claims victory over Amarr throughout Aldodan constellation.\n\n- Emperor
    Bears at Landfall zoo have cub in captivity for first time.\n\n- Conflict between
    capsuleers continues in Drone Regions where diplomacy gives way to dreadnoughts.\n\n-
    Labor-Populist convention ends early after infighting puts future of party in
    doubt.\n\n- Massive Initiative supercapital fleet deployed against WinterCo forces
    in Cloud Ring.\n\n- Minmatar and Amarr militia clash joined by piratic forces
    in Dal.\n\n- ORE praises industrial empyreans in \u201CMiners are Capsuleers too\u201D
    economic report."
