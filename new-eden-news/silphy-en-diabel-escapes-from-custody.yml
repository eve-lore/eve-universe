content:
- body: "![Silphy Wanted](//images.ctfassets.net/1gqwxa4vbed9/3pEm2xQt5lTMguWRH4zMUu/28b01f39396579c2f7a5a4fe9f2d3fd6/Silphy_Wanted.png)\n\nSilphy
    en Diabel has escaped from custody while en route to her trial on New Caldari
    Prime. The unofficial leader of the Intaki Syndicate disappeared when the armored
    convoy that was transporting her was ambushed. While the State Peacekeepers guarding
    the convoy quickly eliminated the attackers, en Diabel was able to escape during
    the confusion. Two Intaki Syndicate members who were to serve as witnesses at
    the trial were assassinated during the escape. Whether they were killed by en
    Diabel or the ambushers is unclear at this time. The witnesses were expected to
    present key evidence of en Diabel\u2019s involvement in the recent Jita-gate incident.
    \n\nGeneral Varanori Ruukin, commander of the State Peacekeepers, has called the
    ambush \u201Ca cowardly act of terrorism.\u201D A full investigation into the
    incident is underway. Early evidence suggests that Intaki Syndicate agents infiltrated
    the convoy, hacking into the transport in which en Diabel was being held as the
    guards fought off the attack. Ruukin wanted to assure all Caldari that \u201Cno
    matter where Silphy has run, we will track her down and bring her to justice.\u201D\n\nFollowing
    the escape, Heika Torigo has been assigned to continue overseeing operations in
    the Syndicate region. The CEP has tasked her with ensuring the development of
    new infrastructure, dismantling the now criminal Intaki Syndicate, and capturing
    en Diabel. According to Torigo, valuable data recovered by capsuleers has already
    helped the State identify key targets. This data came from documentation reclaimed
    from capital ship wrecks left behind following the Syndicate members' attempts
    to escape into Federation space. Torigo wanted to give special thanks to Margaret
    Otomo and Remilia Malitia of Taayusaka Eskeitan for delivering over a thousand
    data sheets into State hands. \u201CThe process will be a long one, but we Caldari
    are not afraid of doing the work.\u201D\n\n### News In Brief\n- State Peacekeepers
    begin arresting Syndicate loyalists as part of security sweep.\n\n- Syndicate
    residents offered megacorp employment as part of rejuvenation efforts.\n\n- Empires
    prepare to rush new prototypes into field as Warpath conflict continues to escalate.\n\n-
    Gate to Exordium opens, fireworks unleashed in Manifest celebration.\n\n- First
    capsuleer death registered in Exordium, CONCORD promises to tighten protocols.\n\n-
    Jita hosts series of capsuleer events as new administrators promise a return to
    stability.\n\n- Core Complexion Inc, Kaalakiota, Duvolle Laboratories and Carthum
    Conglomerate unveil plans for enhanced carriers at Jita Trade Hub military exhibition.\n\n-
    Caldari citizens formally request publishing of Jita deal details; CEP approval
    ratings drop.\n\n- New Eden's prominent creators celebrated at a gala award ceremony
    held in Jita Trade Hub."
