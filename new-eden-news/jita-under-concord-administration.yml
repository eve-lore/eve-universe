content:
- body: "![Jita CONCORD patrol](//images.ctfassets.net/1gqwxa4vbed9/4fqZ8DeXMOeD9rvSFKUUEJ/66d044df23d085df92ad123d3d1d44bd/Jita_CONCORD_patrol.png)\n\nThe
    Caldari State has granted the CONCORD Assembly administrative oversight of the
    system of Jita. The handover was facilitated by EverMore\u2019s Alexander Ducasse,
    who hopes to help bolster the system's status as the beating heart of New Eden\u2019s
    economy. \n\nCONCORD\u2019s new oversight of Jita is the result of weeks of negotiation
    between the Caldari State, CONCORD, business leaders, and Ducasse acting as a
    representative of Jita\u2019s non-Caldari residents. Under the agreement, the
    legendary station Jita 4-4 will remain under the control of the Caldari Navy,
    but with a plan to review that status over the next six months. This review includes
    a buy-out clause, should all parties agree.\n\nThe Caldari State\u2019s Chief
    Executive Panel (CEP) ratified the agreement with a 6-2 majority, with only the
    CEOs of Sukuuvestaa and Kaalakiota voting against the motion. Ishukone\u2019s
    CEO, Mens Repolla, has been the biggest proponent of the deal. He stated that
    \u201Cthough Jita has long been a source of pride for the State, our current relationship
    with the system no longer benefits either party. Handing administration over to
    CONCORD will create an open door to free trade that will benefit the Caldari more
    than a failing grip over the system ever could.\u201D \n\nPrior to the announcement,
    there had already been reports of Navy manufacturing operations reallocating from
    Jita to Perimeter and Kakakela. CEP Chairman Akimaka Saraki has been keen to assure
    citizens that these adjustments will \u201Conly improve Caldari military might\u201D
    and that \u201Ceven though our relationship with Jita is changing, our legacy
    in the system remains. The strong Caldari presence within the system will guarantee
    we benefit from any future prosperity without being bound by accumulating risks.\u201D
    Handing over administration should put an end to the drain on the State caused
    by the Intaki Syndicate\u2019s attack on the system\u2019s financial systems while
    also easing the restrictions that have led to a growing humanitarian crisis. \n\nAlexander
    Ducasse\u2019s EverMore will act as a secondary partner to CONCORD in managing
    the system. According to Ducasse, \u201Cthe people of Jita, whom I represented
    in these negotiations to the best of my ability, would be uncomfortable with handing
    over all control of the trade that made their system great to a government agency
    like CONCORD.\u201D  EverMore\u2019s support will include handling day-to-day
    matters of security and customs enforcement within Jita. \n\nVillore Sec Ops,
    a controversial security firm that joined EverMore in YC124, has accepted the
    contract to act as Jita\u2019s private security force. In addition to matters
    of physical security, EverMore has also offered the expertise of Vapor Sea Technologies
    and IRIS, EverMore\u2019s own AI liaison, to help resolve the corruption of Jita\u2019s
    financial systems. IRIS issued a system-wide announcement saying, \u201CNot to
    worry, my dear partners in enterprise. We will put a swift end to this financial
    incursion.\u201D\n\n### New Trade Embassies Established in Jita\n\nAs a part of
    CONCORD\u2019s involvement, new Trade Embassies have been established to represent
    the business interests of CONCORD\u2019s other members. The head of CONCORD\u2019s
    Secure Commerce Commission, Eman Autrech, has championed this as a moment of \u201Ceconomic
    diplomacy in a time of great turmoil. While militaries clash, trade remains the
    last functioning conduit of diplomacy between nations.\u201D\n\nHouse Tash-Murkon
    has negotiated a position as the representatives of the Amarr Empire in this endeavor.
    Empress Catiz I endorsed this move as a \u201Cnew path towards holy prosperity\u201D.
    This is the first time the house has been granted holdings outside of the Amarr
    Empire in what Lord Tunir Tash-Murkon has called \u201Cthe dawn of a new age for
    Imperial presence\u201D. \n\nThe Sebiestor tribe was invited by Ducasse to represent
    Minmatar Republic interests within the system. Their Tribal Chief Acassa Midular
    welcomed the invitation as \u201Can opportunity to bring new growth and innovation
    to the Matari.\u201D \n\nNo representatives of the Federation administration were
    present during the negotiations, as all diplomatic channels between the two governments
    have shut down due to the ongoing Warpath conflict. Nonetheless, the Quafe Company
    has agreed to represent the Federation\u2019s private interests within Jita. A
    trusted trade partner of the Caldari State, even in times of open conflict, Quafe
    has expressed enthusiasm for the opportunities the changes to Jita will offer.\n\n###
    News In Brief\n- House of Records issues arrest order for all members of the Intaki
    Syndicate.\n\n- Brutor Chief Wkumi Pol criticizes Sebiestor for establishing Trade
    Embassy instead of granting to wider Republic.\n\n- Starsi announces State-first
    patriotic marketing campaign.\n\n- Titan clashes lead to spike in Warpath death
    toll amongst baseliner ship crews.\n\n- Rumors of unease amongst Amarr houses
    over Tash-Murkon preferential treatment denied by representatives.\n\n- IMN reports:
    Adaptive Provisioning offers relief to isolated Jita communities recovering from
    State restrictions. \n\n- Soraya Roden praises Quafe for putting growth ahead
    of politics at rally calling for vote recount."
