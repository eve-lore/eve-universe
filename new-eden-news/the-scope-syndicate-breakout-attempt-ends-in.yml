    *Following an Intelligence release from Caldari Navy Executive General Heika Torigo
    about Intaki Syndicate fleets attempting to break out of the Syndicate region
    and into Gallente high-security space, Capsuleers located and engaged one of the
    suspected fleets, and the Scope was broadcasting live from the battle as it happened.*


    ### News In Brief


    - Caldari State sets trial of Silphy en Diabel for 19th of May.


    - Titans deployed across high-sec as Warpath conflict heats up.


    - Exordium more important now than ever, says AIR CEO Elida Balashirian.


    - Ducasse says Jita negotiations progressing well despite rumors of deadlock.


    - AIR help CONCORD rebuild security protocols for Exordium project.


    - CONCORD calls for swift conclusion to Jita negotiations as unrest spreads.


    - Business leaders from across cluster join in Jita negotiations at Ducasse invitation.


    - Brutor join Starkmanir clan members in petitioning for Arzad II name change
    on celestial register.


    - Pressure on centralized Amarr economy pushes border system commoners into poverty
    according to recent analysis.'
