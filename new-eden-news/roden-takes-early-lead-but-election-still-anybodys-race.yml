content:
- body: "![Gallente Election March 26th](//images.ctfassets.net/1gqwxa4vbed9/5CZHAf0qBQrPipmvPFMyGZ/4f88fa7c4ed0fc9f39dedd00ce0590d8/Gallente_Election_March_26th.png)\n\nLatest
    polling data shows that Soraya Roden has a narrow lead over her rivals in the
    race to become the next President of the Gallente Federation. With election day
    still weeks away, a Federation-wide poll has placed the Progressive Party\u2019s
    candidate infront with 35.4%, followed by the Autonomists' Alix Moreau with 33.2%
    and Independent Lucas Tenzin just behind in third place with 31.3%.\n\nThe Gallente
    public seems to be drawn to Roden\u2019s legacy as the grandchild of one of the
    Federation's most popular former Presidents. Capsuleers have rallied in significant
    numbers to Roden\u2019s message of strength and corporate control. At a press
    conference in Dodixie, Roden thanked all her supporters for their \u201Ctireless
    advocacy and dedication to the values that made our Federation strong.\u201D She
    was, however, quick to point out that \u201Cthis race is far from won, there\u2019s
    more to be done and I know you are all the ones to do it.\u201D\n\nGovernor Alix
    Moreau, who is only marginally behind Roden, has responded by trying to increase
    their campaign\u2019s reach. \u201CWhen you offer people the future, it is understandable
    that their first response would be trepidation. Our task now is to make it clear
    that my campaign\u2019s vision is one of hope. Hope, and the freedom to dream
    without limits.\u201D Alix Moreau has pointed to the rising popularity of new
    hybrid drones based on Rogue Drone technology as a clear sign that the public
    should embrace their proposals for further drone experimentation.\n\nThough Senator
    Lucas Tenzin had an initial surge of popularity thanks to his grassroots support,
    but with the candidates so close, he did not have to fall far to drop into third
    place. Tenzin has redoubled his efforts and is travelling throughout the Federation
    to try and inspire communities to back proposals for a \u201Chumanity first approach\u201D.
    The Tenzin campaign has identified that though they have an enthusiastic hardcore,
    they cannot win if they do not attract voters in greater numbers. The campaign
    has begun trying to find ways to specifically target capsuleers with their message,
    as the outsized influence of this group could turn the tide. \n\nWith only two
    points between the candidates and an early upset, it truly remains anyone\u2019s
    race.\n\n### News in Brief\n- Capsuleer Randunip announces Presidential candidacy,
    pundits say not being on the ballot may hurt their chances.\n\n- Presidential
    Candidates' engineering teams work around the clock to improve campaign buses\u2019
    titanic align times.\n\n- Tenzin campaign team dismisses Amarr collusion conspiracy
    theories as baseless.\n\n- Use of rogue drone tech throughout Federation raises
    concerns with CONCORD.\n\n- House of Records agents dispatched throughout State
    as Caldari Business Tribunal reports evidence of corruption.\n\n- Scordite harvesting
    spikes across Federation as capsuleers boost economy in name of their preferred
    Presidential candidates.\n\n- Ribbit, Federation enthusiasts sworn to election
    support, announce closure.\n\n- Military build up in Amarr border systems reportedly
    placing significant economic pressure on holders.\n\n- Caldari militia members
    scramble to recruit former Federation supporters following Ribbit closure.\n\n-
    Furious preparations underway two weeks out from Anger Games 7."
