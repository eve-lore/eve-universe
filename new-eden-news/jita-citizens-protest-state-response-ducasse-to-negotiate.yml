content:
- body: "![jita conversation](//images.ctfassets.net/1gqwxa4vbed9/4zgcyAS3ZboE0Dp90K8Dii/b82c48d2326c3464a5ad7aba3b05c6e2/jita_conversation.png)\n*Chairman
    Saraki and Alexander Ducasse pose for a photo while on approach to Jita 4-4.*\n\nResidents'
    groups in Jita have begun calling for an end to State control. This comes in response
    to new security restrictions brought into effect after the recent gate tragedy.
    The aggrieved residents of Jita claim that the new restrictions are causing unnecessary
    hardship and that State control is no longer in their best interests.\n\nThe ongoing
    hyperspace manipulation taking place in the system has been redirecting fees and
    taxes that normally would be paid to the Caldari State, instead diverting them
    to what the Chief Executive Panel (CEP) believes are Gallente-controlled accounts.
    This has turned the Caldari\u2019s most profitable system into a significant liability.
    To isolate this problem, the Caldari State has brought in curfews, additional
    security checks, regular stop and search programs, and, most notably, tighter
    border controls. These border controls have slowed the flow of essential supplies
    into the system, which has already led to shortages of medical supplies on some
    of Jita\u2019s planets. \n\nIn response, there have been protests across the planets
    of Jita, with protestors shouting slogans calling for an end to State control.
    The Caldari Navy has been quick to shut these protests down. According to Jita
    residents, this has included the use of excessive force against civilian targets.
    The Caldari Navy, however, insists that only proportional non-lethal methods have
    been deployed.\n\nChairman Akimaka Saraki has called on citizens to show \u201Cfortitude
    in the face of these restrictions,\u201D calling them a \u201Ctemporary necessity
    to guarantee State security and economic stability.\u201D However, as Jita is
    New Eden\u2019s biggest interstellar trade hub, many who call Jita home are not
    Caldari-born, and a large number are not even Caldari citizens. According to recent
    survey data, even those who are Caldari citizens are atypical within the State.
    When asked to rank how they identified, the majority saw themselves as people
    of Jita first and Caldari second. This attitude is incredibly rare within the
    State. The current crisis marks the first time that these two identities have
    come into conflict over a major political incident.\n\nTo avoid any further unrest,
    the CEP has asked EverMore\u2019s President, Alexander Ducasse, to act as an arbitrator
    between the State and Jita\u2019s residents. EverMore\u2019s Paragon corporation
    controls the only non-Caldari station in the system, and EverMore has been an
    active part of Jita\u2019s community. Chairman Saraki met with Ducasse in Jita
    to discuss the residents\u2019 needs. Saraki told the Scope that \u201Cthe disparate
    identities of those restless elements within Jita require complex negotiations.
    My first priority right now, as all honorable Caldari should be, is to bring about
    justice for those harmed by the attacks on our gates. We have been assured by
    these dissidents that they would be happy to be represented by Ducasse. As a man
    who understands complex economic matters, I am sure this will allow for a swift
    resolution so that we can give our full attention to the total security of all
    Caldari.\u201D\n\nDucasse has expressed his \u201Cgratitude to the Chairman for
    doing me the honor of allowing me to speak on behalf of a community I feel so
    connected to. Jita is the heart of trade in New Eden, and it must be protected
    to ensure a prosperous future for us all.\u201D\n\n### News in Brief\n\n- IMN
    reports on remote communities without medical support due to State restrictions.\n\n-
    Silphy enDiabel summoned to New Caldari for inquest into Intaki Syndicate involvement
    in gate disaster.\n\n- Inner Circle diplomatic emergency session ends early as
    all involved parties walk out.\n\n- President Moreau calls on Caldari to publish
    evidence of Federation involvement in attacks.\n\n- CONCORD to oversee Jita negotiations,
    promises to guarantee a fair resolution.\n\n- Mercenary pilots negotiate open
    contracts with major faction militaries as tensions rise.\n\n- Services on \u201Cfaith
    and fortitude\u201D held throughout Amarr border systems.\n\n- Republic Fleet
    holds local meetings with clan leaders to coordinate defense strategies.\n\n-
    AIR promises to protect Exordium project from threat of rising conflict."
