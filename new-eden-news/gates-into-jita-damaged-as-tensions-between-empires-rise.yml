content:
- body: "![Damaged Gate to Jita](//images.ctfassets.net/1gqwxa4vbed9/2gUoWjAhnHCkBvlhxCEduB/ae9edeeda7088450c0bfeb6654988250/Damage_Gate_to_Jita_2.png)\n\n###
    Disaster At Gates Surrounding Jita\nA catastrophic hyperspace incident has damaged
    all seven stargates leading into Jita. Spacetime fractures, similar to those witnessed
    inside Fractured Fields, simultaneously opened around the gates, resulting in
    significant damage to their structure. The majority of operational staff and maintenance
    workers stationed on the gates at the time were killed instantly by either the
    damage done to the gates or the massive burst of radiation released as the fractures
    formed. Many others were badly injured, and some are expected to begin displaying
    signs of fatal radiation sickness in the weeks to come. The final death toll is
    expected to be in the thousands.\n\nThe gates remain operational despite their
    damaged status. The radiation, though initially fatal, has already begun to disperse
    throughout space. As it disperses, it has already become visible from nearby stars
    as it moves faster than light through the Drifter Hyperspace Network. At this
    time, only extreme long-term exposure is likely to result in any negative effects.
    This does, however, make any immediate repairs impossible. Even repair drones
    are likely to malfunction after long-term exposure, making it only possible to
    perform essential operational maintenance at this time.\n\nThe Caldari State has
    placed emergency measures on Jita residents while their investigation into the
    cause of the incident is underway. These restrictions have put pressure on already
    busy emergency response teams. Additional support has been accepted from EverMore,
    who are providing aid from their Paragon Fulfillment Center inside Jita. \n\n###
    Caldari State Promises Retribution\nThe Caldari State has responded quickly by
    launching a full investigation and placing all Caldari Navy bases on the highest
    level of alert. An emergency session of the Caldari State\u2019s governing body,
    the Chief Executive Panel (CEP), was held behind closed doors. Following the session\u2019s
    conclusion, all eight members and CEOs of Caldari\u2019s megacorporations appeared
    before crowds gathered in Landfall on New Caldari Prime. Above them, the green
    aura of the Fracture radiation from nearby star systems was already visible in
    the night sky.\n\nCEP Chairman Akimaka Saraki spoke on the Panel\u2019s behalf,
    lamenting the \u201Cdevastating shock of this terrible tragedy.\u201D He began
    by wishing the families and corporations of those who died at the gates \u201Cresilience
    in the face of this unprovoked attack.\u201D He went on to clarify the CEP\u2019s
    position in a speech that has shocked New Eden's political establishment: \n\n\u201CI
    call this an attack because that is what it was, not an \u2018incident\u2019.
    I spit that word out because it offends my mouth. Have no doubt, this was a deliberate
    and strategic assault on the Caldari State by subversive forces both inside Jita
    and beyond the limits of our State. But hear my words, there will be no limits
    to our retribution.\n\n\u201CFor some time now, the House of Records and Caldari
    Business Tribunal have been investigating what they believed was conventional
    financial corruption operating out of Jita but impacting the entire State. Due
    to the specialist analysis of our research teams in the Conflux Eyrie on the aftermath
    of today\u2019s attack, we can now reveal that this financial corruption was actually
    high-tech extortion executed via the manipulation of the Drifter Hyperspace Network\u2019s
    data transfer capabilities. It was the experimental use of this improperly understood
    technology that resulted in today\u2019s disaster.\n\n\u201CWe can also confirm
    that this theft has been enabled by the treachery of members of the Intaki Syndicate,
    but we have followed the money, and their benefactors are none other than the
    Gallente Federation. This was the reason for the hyperspace manipulation that
    is still ongoing in the space surrounding Jita. Drifter Hyperspace Network experimentation
    is only available to the Drifter Wormhole occupiers, not the Gallente Federation.
    So we must conclude that these criminal actions also require a third party, either
    the Minmatar Republic, the Amarr Empire, the Triglavians, or EDENCOM.\n\n\u201CThis
    attempt to manipulate the Caldari State\u2019s economy and the resulting tragedy
    are war crimes. We call on CONCORD to take immediate punitive action against the
    Gallente and offer unmitigated support to our own investigations, or else we will
    be forced to take matters into our own hands.\u201D\n\n### Gallente President
    Denies Accusations\nThe Jita gate incident has overshadowed today\u2019s inauguration
    on Gallente Prime. Some questioned if the event should be delayed, but the new
    President, Alix Moreau, opted to go ahead despite the possible diplomatic fallout.
    \u201CWhile I feel sorrow for those innocents harmed in this terrible disaster,
    it is not possible for me to resolve any coming crisis unless I have been sworn
    in.\u201D\n\nMoreau and the Federation Administration have rejected Chairman Saraki\u2019s
    claims outright, denying any involvement in Hyperspace Network manipulation or
    the formation of fractures around the gates into Jita. Sources within the Federation
    Senate have told the Scope that many are assuming the Chairman\u2019s statement
    was an attempt by the CEP to manipulate the incident into an excuse for warmongering.\n\nFollowing
    Moreau\u2019s election victory over the aggressive Roden and veteran Tenzin, concerns
    have been raised by more hawkish members of the Senate that their new President
    may lack the experience necessary to command the Federation\u2019s military. With
    the Caldari State\u2019s call for punitive action, there is fear that they will
    attempt to strike while this militarily inexperienced leader is still gaining
    their bearings.\n\nMoreau has assured the Federation that, \u201CI am ready to
    do every part of this job, and that includes unravelling the complexities of war
    should it come to that. I hope that we can avoid this outcome, but should it prove
    inevitable, the continuation of our great democratic experiment remains paramount.\u201D\n\n###
    Conflict Ripples Out to Amarr and Minmatar\nThe Tribal Council of the Minmatar
    Republic has co-signed a statement by Sanmatar Maleatu Shakor rejecting any suggestion
    of involvement in today\u2019s tragedy. The statement makes it clear that \u201Cthe
    Republic is saddened to hear of the terrible incidents surrounding Jita\u201D
    while categorically denying \u201Cany suggestion of collusion or involvement in
    the disaster.\u201D \n\nBrutor Chief Wkumi Pol and Krusual Chief Tenerhaddi Dykon
    have gone beyond the limits of this statement to point fingers at the Amarr Empire.
    \u201CThe Amarr economy has been suffering as they attempt to keep step with recent
    Republic advances.\u201D Chief Pol told reporters. \u201CWe remember Turnur and
    their reckless abuse of technology in their endless lust for power.  We are watching
    the Empire very closely as always. The Republic must be certain that no similar
    tragedy can occur here.\u201D\n\nThe Amarr Empress, Catiz I, has similarly cast
    blame on the Republic, stating that the Republic\u2019s \u201Csuspiciously good
    fortunes coincidentally began within the same period as this supposed financial
    espionage.\u201D She added that \u201CThe Empire is not intimidated by the Republic\u2019s
    endless posturing; perhaps it is time they were reminded of that.\u201D \n\nTensions
    have been ratcheting up between the two nations since the Republic began to increase
    its military spending back in February. As rhetoric between the major factions
    of New Eden turns even more hostile, there are fears that the limited avenues
    of diplomacy between them may soon collapse. CONCORD Director General Panaja Paukonsuo
    has vowed to step in and try to negotiate between the aggrieved parties personally,
    while assuring the public that \u201CCONCORD protocols prohibit serious misconduct
    outside the limits of the designated Warzones. While those hold, so does a path
    to stability.\u201D"
