content:
- body: "![Election Poll Week 3](//images.ctfassets.net/1gqwxa4vbed9/uTCmP8V2BDdrvLDItL0F9/23d80a347201c1f5d83f035fd108993c/Week-3.jpg)\n\nGovernor
    Alix Moreau is closing in on leading candidate Soraya Roden in Gallente Election
    polling as the last week of campaigning begins.\n\nWith the finish line in sight,
    candidates are pulling out all the stops. Further incentive opportunities have
    been added for capsuleer supporters as the candidates attempt to use their influence
    to sway swing voters. With these new opportunities in play and the candidates
    still tantalizingly close to one another, capsuleer actions over this final week
    have the potential to cause an upset.\n\nOnly 0.6% seperates the top two candidates,
    and Roden finally appears to be facing the possibility of a loss. Soraya Roden
    was not available for comment. A look at her public schedule explains why, showing
    non-stop stadium events for the coming week. However, her grandfather, Former-President
    Jacus Roden, was available for comment: \u201CA close race with hard-fought competition,
    that is the true spirit of our democracy. Nonetheless, Soraya\u2019s victory is
    not in doubt. She has led in the polls for weeks, and she will lead in the ballot
    box.\u201D\n\nAlix Moreau is totally dedicated to trying to make those words ring
    false. Their campaign team has used advanced data analysis to target key demographics,
    tailoring their message to undecided voters. \u201CThe future I ask our citizens
    to embrace is not one of high profits for a select elite. It is one in which new
    discoveries improve the lives of everyone within the Federation. A future without
    drudgery in which we are free to reach new heights. Making sure that our people
    understand that this is a future that includes them is of vital importance.\u201D\n\nLucas
    Tenzin is trailing in third place. Some of his supporters have even begun encouraging
    newcomers to back Moreau instead in order to avoid a Roden victory. Despite this,
    Tenzin remains unwavering in his campaign. At a Repair Facility in Actee he told
    those gathered that, \u201CNo matter the result, we can be proud that we are fighting
    the good fight. The issues we have raised in this campaign matter, and election
    day is still a week away. We will be heard, we will not surrender.\u201D\n\n###
    News in Brief\n\n- Capital engagements greenlit for Rampant Fabricators as Rogue
    events continue to spread.\n\n- Tenzin expresses gratitude to INN Galnet broadcast
    for showing support for his campaign\n\n- Deepwater Hooligans' rare \"Prometheus\"
    Fortizar in Turnur destroyed by Snuffed Out alliance.\n\n- Freeport Keepstar deployed
    in Basgerin by Hydra Reloaded, the alliance hopes to provide industrial and tactical
    opportunities to capsuleers in Sinq Laison and Everyshore.\n\n- Investigations
    into stargate disruptions in Geminate underway after extreme traffic causes concern.\n\n-
    Galnet releases shortlists for first ever Capsuleer Creator Awards.\n\n- 50 teams
    battling it out at Anger Games 7 this weekend.\n\n- Insurance claim adjuster descend
    on Amamake as 12th Annual Stay Frosty Frigate Free For All is expected to result
    in spike in payouts."
